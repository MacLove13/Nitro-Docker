version: '3.7'

volumes:
  volume-mysql:
  volume-arcturus-maven-repo:
  volume-arcturus-target:
  volume-nitro-converter-node-modules:
  volume-nitro-react-node-modules:
  volume-cms-vendor:
  volume-furni-uploads:

services:
  arcturus:
    container_name: arcturus
    build:
      context: emulator
    entrypoint: ["/bin/sh","/app/scripts/build.sh"]
    volumes:
      - ./emulator/:/app/
      - volume-arcturus-target:/app/arcturus/target
      - volume-arcturus-maven-repo:/root/.m2
      - ./cms/Cosmic/public/camera:/var/www/html/public/camera
    ports:
      - 3000:3000
      - 3001:3001
      - 2096:2096
    depends_on:
      - mysql
    networks:
      nitro:

  nitro:
    container_name: nitro
    build:
      context: nitro
    entrypoint: ["/bin/sh","/app/scripts/build.sh"]
    volumes:
      - ./nitro/:/app/
      - volume-nitro-converter-node-modules:/app/nitro-converter/node_modules
      - volume-nitro-react-node-modules:/app/nitro-react/node_modules
    ports:
      - 1080:5154
      - 8080:8080
      - 8081:8081
    networks:
      nitro:

  cms:
    container_name: cms
    build:
      context: cms
    entrypoint: ["/bin/sh","/app/scripts/build.sh"]
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=arcturus
      - DB_USER=arcturus_user
      - DB_PASS=arcturus_pw
      - DB_CHARSET=utf8
      - DB_COLLATION=utf8_general_ci
      - CMS_DOMAIN=localhost:8082
      - CMS_NITRO_PATH=http://localhost:1080
      - CMS_ASSET_PATH=http://localhost:8080
      - CMS_SHORTNAME=Nitro
      - CMS_SITENAME=Nitro
    volumes:
      - ./cms/Cosmic:/var/www/html
      - ./cms/Database:/database
      - volume-cms-vendor:/var/www/html/vendor
      - volume-furni-uploads:/var/www/html/public/uploads/furni_creator
    ports:
      - 8082:80
    depends_on:
      - mysql
      - arcturus
      - nitro
    networks:
      nitro:

  furni-generator:
    container_name: furni-generator
    build:
      context: furni-generator
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=arcturus
      - DB_USER=arcturus_user
      - DB_PASS=arcturus_pw
      - UPLOADS_DIR=/uploads
      - NITRO_ASSETS_DIR=/nitro-assets
      - SPRITE_ID_OFFSET=10000
      - POLL_INTERVAL=5
      - PORT=5000
    volumes:
      - volume-furni-uploads:/uploads
      - ./nitro/nitro-assets:/nitro-assets
    ports:
      - 5010:5000
    depends_on:
      - mysql
    networks:
      nitro:

  mysql:
    container_name: mysql-nitro
    image: mariadb:10.6
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=arcturus_root_pw
      - MYSQL_USER=arcturus_user
      - MYSQL_PASSWORD=arcturus_pw
      - MYSQL_DATABASE=arcturus
    volumes:
      - volume-mysql:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/dumps:/docker-entrypoint-initdb.d
    ports:
      - 13306:3306
    networks:
      nitro:

networks:
  nitro:
